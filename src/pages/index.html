<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu portfólio</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/media.css" />
    <link rel="shortcut icon" href="../image/logo.png" type="image/x-icon" />
    <!-- React -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <!-- ReactDOM (conecta o React com a página HTML) -->
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel (para escrever JSX / HTML dentro do JavaScript) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>

  <script type="text/babel">
    function Header() {
      return (
        <div>
          <header className="header">
            <div className="header-logo">
              <a href="index.html">
                <img id="logo" src="../image/logo.png" alt="Logo" />
              </a>
              <h1 id="header-titulo">Criado por Eduardo</h1>
            </div>
            <nav id="header-nav">
              <ul id="header-list">
                <li className="header-item">Início</li>
                <li className="header-item">Sobre</li>
                <li className="header-item">Habilidades</li>
                <li className="header-item">Projetos</li>
                <li className="header-item header-contato">Contato</li>
              </ul>
            </nav>
          </header>
        </div>
      );
    }

    function Main() {
      return (
        <div className="content-main">
          <main className="main">
            <section id="content-inicio"></section>
          </main>
        </div>
      );
    }

    function Footer() {}

    function App() {
      return (
        <div>
          <Header />
          <Main />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</html>
