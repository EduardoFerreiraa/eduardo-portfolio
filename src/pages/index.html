<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/media.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="../image/logo.png" type="image/x-icon" />
    <!-- React -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <!-- ReactDOM (conecta o React com a página HTML) -->
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel (para escrever JSX / HTML dentro do JavaScript) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>

  <script type="text/babel">
    function Header() {
      return (
        <div>
          <header className="header">
            <div className="header-logo">
              <a href="index.html">
                <img id="logo" src="../image/logo.png" alt="Logo" />
              </a>
              <h1 id="header-titulo">Criado por Eduardo</h1>
            </div>
            <nav id="header-nav">
              <ul id="header-list">
                <li className="header-item">Início</li>
                <li className="header-item">Sobre</li>
                <li className="header-item">Habilidades</li>
                <li className="header-item">Projetos</li>
                <li className="header-item header-contato">Contato</li>
              </ul>
            </nav>
          </header>
        </div>
      );
    }

    function Main() {
      return (
        <div className="content-main">
          <main className="main">
            <section id="content-inicio">
              <div className="inicio">
                <p id="inicio-paragrafo">Olá!</p>
                <h1 id="inicio-titulo">Eu sou Desenvolvedor Web</h1>
                <p id="frase-curta">
                  Criando interfaces modernas, responsivas e funcionais.
                </p>
                <div className="content-count">
                  <div className="count">
                    <p className="quantidade">
                      <span className="span-projeto">+</span>10
                    </p>
                    <p className="projetos-completos">Projetos completos</p>
                  </div>
                  <div className="count">
                    <p className="quantidade">
                      <span className="span-projeto">+</span>6
                    </p>
                    <p className="projetos-completos">Tecnologias aprendidas</p>
                  </div>
                </div>
                <div id="veja-projetos">
                  <a href="#">Veja meus projetos</a>
                </div>
              </div>
              <div className="content-minhaFoto">
                <img src="../image/minha-foto.png" alt="Minha foto" />
              </div>
            </section>
          </main>
        </div>
      );
    }

    function Footer() {}

    function App() {
      return (
        <div>
          <Header />
          <Main />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</html>
